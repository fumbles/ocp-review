---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocp-review
  labels:
    app: ocp-review
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocp-review
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ocp-review
    spec:
      containers:
      - name: ocp-review
        image: fumbles/ocp-review:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ocp-review
  labels:
    app: ocp-review
spec:
  selector:
    app: ocp-review
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ocp-review
  labels:
    app: ocp-review
spec:
  to:
    kind: Service
    name: ocp-review
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
