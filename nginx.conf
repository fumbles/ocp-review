server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # index.html — must never be cached so new deployments are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Serve the single-page app — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS and CSS — revalidate on every request (ETag/Last-Modified will avoid
    # re-downloading unchanged files, but a new deployment always wins)
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # True immutable assets (images, fonts) — safe to cache long-term
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression (text/html is included by default — don't re-list it)
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;
}
